# Issue Radar - finds unclaimed OSS issues
name: Issue Radar

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  find-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run Issue Radar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node src/index.js

      - name: Save seen issues
        uses: actions/upload-artifact@v4
        with:
          name: seen-issues
          path: seen_issues.json
